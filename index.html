<!DOCTYPE html>

  <title>BioMimi</title>
  <meta

    content="BioMimi is a biomimicry learning platform for architecture, engineering, and sustainable cities."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
